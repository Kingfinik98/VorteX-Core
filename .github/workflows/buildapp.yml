name: Build Android APK Signed (Manual Only)

on:
  # Menghapus push dan pull_request agar tidak otomatis
  # Mengaktifkan tombol manual di tab Actions GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: android-actions/setup-java@v4 # Menggunakan provider yang lebih spesifik untuk Android
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Decode Keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY }}
        run: |
          # Membuat file jks untuk proses signing
          echo "$SIGNING_KEY_BASE64" | base64 --decode > release.jks
          if [ -d "app" ]; then
            echo "$SIGNING_KEY_BASE64" | base64 --decode > app/release.jks
          fi

      - name: Build with Gradle
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Mencari lokasi gradlew untuk eksekusi build
          GRADLEW_PATH=$(find . -name "gradlew" -not -path "*/.*" | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "ERROR: File gradlew tidak ditemukan!"
            exit 1
          fi
          
          echo "Building ZIXINE 445 from: $GRADLEW_PATH"
          chmod +x "$GRADLEW_PATH"
          
          # Build APK Release
          $GRADLEW_PATH assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zixine-445-Release
          path: |
            app/build/outputs/apk/release/*.apk
            build/outputs/apk/release/*.apk
          
