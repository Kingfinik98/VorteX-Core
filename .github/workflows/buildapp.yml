name: Build Zixine Engine V29

on:
  # 1. Tombol Manual di tab Actions GitHub
  workflow_dispatch:

  # 2. Jalan otomatis HANYA jika ada push di branch main/master
  push:
    branches:
      - main
      - master
    # HANYA jalan jika file-file penting ini berubah
    paths:
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
    # JANGAN jalan jika hanya edit file berikut
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Release APK (Unsigned)
        run: ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zixine-v29-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
