name: Build Android APK Signed

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Find and Fix Gradlew Permission
        run: |
          # Perintah ini bakal nyari gradlew di mana pun dan kasih izin eksekusi
          find . -name "gradlew" -exec chmod +x {} +
          echo "Gradlew found and permission granted."

      - name: Decode Keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY }}
        run: |
          # Kita buat file jks di root project dan di folder app biar aman
          echo "$SIGNING_KEY_BASE64" | base64 --decode > release.jks
          echo "$SIGNING_KEY_BASE64" | base64 --decode > app/release.jks

      - name: Build with Gradle
        run: |
          # Cari lokasi gradlew lalu eksekusi assembleRelease
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          $GRADLEW_PATH assembleRelease
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Production-APK
          path: "**/build/outputs/apk/release/*.apk"
