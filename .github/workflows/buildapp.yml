name: Build Zixine Engine V29

on:
  # 1. Tombol Manual (WAJIB ADA buat kamu yang suka trial-error)
  workflow_dispatch:

  # 2. Jalan otomatis hanya jika ada perubahan di file sistem/app
  push:
    branches:
      - main
      - master
    paths:
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zixine-v29-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
